<svg width="900" height="80" viewBox="0 0 900 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footerbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#080809"/>
      <stop offset="50%"  stop-color="#0e0e10"/>
      <stop offset="100%" stop-color="#080809"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="80" fill="url(#footerbg)"/>

  <!-- Top border line -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="#2a2a2e" stroke-width="1"/>

  <!-- Bottom border line -->
  <line x1="0" y1="79" x2="900" y2="79" stroke="#2a2a2e" stroke-width="1"/>

  <!-- Grid lines (subtle engineering feel) -->
  <g stroke="#1a1a1e" stroke-width="0.5" opacity="0.8">
    <line x1="0"   y1="20" x2="900" y2="20"/>
    <line x1="0"   y1="40" x2="900" y2="40"/>
    <line x1="0"   y1="60" x2="900" y2="60"/>
    <line x1="150" y1="0"  x2="150" y2="80"/>
    <line x1="300" y1="0"  x2="300" y2="80"/>
    <line x1="450" y1="0"  x2="450" y2="80"/>
    <line x1="600" y1="0"  x2="600" y2="80"/>
    <line x1="750" y1="0"  x2="750" y2="80"/>
  </g>

  <!-- Corner tick marks -->
  <g stroke="#333338" stroke-width="1" fill="none">
    <!-- Top-left -->
    <polyline points="8,18 8,8 18,8"/>
    <!-- Top-right -->
    <polyline points="882,8 892,8 892,18"/>
    <!-- Bottom-left -->
    <polyline points="18,72 8,72 8,62"/>
    <!-- Bottom-right -->
    <polyline points="882,72 892,72 892,62"/>
  </g>

  <!-- Left badge: EOF -->
  <rect x="22" y="28" width="38" height="24" rx="2" fill="none" stroke="#2a2a2e" stroke-width="1"/>
  <text
    x="41" y="44"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="9"
    font-weight="700"
    letter-spacing="1.5"
    fill="#444448"
  >EOF</text>

  <!-- Left dot separator -->
  <circle cx="78" cy="40" r="2.5" fill="#2a2a2e"/>

  <!-- Main footer text -->
  <text
    x="450" y="45"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="13"
    font-weight="700"
    letter-spacing="5"
    fill="#888884"
  >PLAY HARD. CODE HARDER.</text>

  <!-- Right dot separator -->
  <circle cx="822" cy="40" r="2.5" fill="#2a2a2e"/>

  <!-- Right badge: v∞ -->
  <rect x="840" y="28" width="38" height="24" rx="2" fill="none" stroke="#2a2a2e" stroke-width="1"/>
  <text
    x="859" y="44"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="9"
    font-weight="700"
    letter-spacing="1"
    fill="#444448"
  >v∞</text>
</svg>
