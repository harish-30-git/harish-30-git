<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Base dark background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="40%" stop-color="#0d0100"/>
      <stop offset="75%" stop-color="#3a0800"/>
      <stop offset="100%" stop-color="#7a1a00"/>
    </linearGradient>

    <!-- Fire glow at bottom -->
    <radialGradient id="fireglow" cx="50%" cy="100%" r="60%">
      <stop offset="0%"  stop-color="#ff5500" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#cc2200" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#550800" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Second fire pulse -->
    <radialGradient id="fireglow2" cx="50%" cy="110%" r="45%">
      <stop offset="0%"  stop-color="#ff8800" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#ff3300" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Name text gradient: white → amber → deep red -->
    <linearGradient id="namegrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="20%"  stop-color="#ffe8c0"/>
      <stop offset="50%"  stop-color="#ffaa44"/>
      <stop offset="78%"  stop-color="#ff5500"/>
      <stop offset="100%" stop-color="#cc1100"/>
    </linearGradient>

    <!-- Ember glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle text outer glow -->
    <filter id="textglow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Crack / lightning texture mask -->
    <filter id="cracknoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="900" height="220" fill="url(#bg)"/>

  <!-- Fire glow layers -->
  <rect width="900" height="220" fill="url(#fireglow)"/>
  <rect width="900" height="220" fill="url(#fireglow2)"/>

  <!-- Crack lines (orange veins rising from bottom) -->
  <g opacity="0.25" stroke-linecap="round" fill="none">
    <polyline points="120,220 140,175 128,155 155,110 143,85 165,50" stroke="#ff6600" stroke-width="1"/>
    <polyline points="280,220 268,185 285,160 270,120 290,90" stroke="#ff4400" stroke-width="0.7"/>
    <polyline points="450,220 455,178 440,152 460,105 448,70" stroke="#ff5500" stroke-width="0.8"/>
    <polyline points="630,220 618,180 640,150 625,100 648,60" stroke="#ff4400" stroke-width="0.7"/>
    <polyline points="780,220 770,172 788,148 772,108 792,70 778,40" stroke="#ff6600" stroke-width="1"/>
    <polyline points="360,220 368,195 350,175 370,145" stroke="#ff3300" stroke-width="0.5"/>
    <polyline points="540,220 530,200 548,180 535,155" stroke="#ff4400" stroke-width="0.5"/>
  </g>

  <!-- Ember sparks (small glowing dots) -->
  <g filter="url(#glow)">
    <circle cx="160" cy="80"  r="1.5" fill="#ff8800" opacity="0.9"/>
    <circle cx="230" cy="55"  r="1"   fill="#ffaa00" opacity="0.8"/>
    <circle cx="320" cy="70"  r="2"   fill="#ff6600" opacity="0.7"/>
    <circle cx="410" cy="40"  r="1.5" fill="#ffcc44" opacity="0.85"/>
    <circle cx="500" cy="65"  r="1"   fill="#ff8800" opacity="0.8"/>
    <circle cx="570" cy="45"  r="2"   fill="#ffaa00" opacity="0.75"/>
    <circle cx="660" cy="75"  r="1.5" fill="#ff6600" opacity="0.9"/>
    <circle cx="740" cy="50"  r="1"   fill="#ffcc44" opacity="0.7"/>
    <circle cx="190" cy="120" r="1"   fill="#ff5500" opacity="0.5"/>
    <circle cx="480" cy="95"  r="1.5" fill="#ff7700" opacity="0.6"/>
    <circle cx="720" cy="100" r="1"   fill="#ff6600" opacity="0.55"/>
    <circle cx="840" cy="60"  r="1.5" fill="#ffaa00" opacity="0.7"/>
    <circle cx="88"  cy="95"  r="1"   fill="#ff8800" opacity="0.65"/>
  </g>

  <!-- Flame shapes at the bottom -->
  <g opacity="0.6">
    <!-- Flame 1 -->
    <path d="M60,220 Q72,188 68,172 Q80,155 76,220Z" fill="#ff4400" opacity="0.5"/>
    <!-- Flame 2 -->
    <path d="M180,220 Q195,180 190,160 Q205,138 200,220Z" fill="#ff5500" opacity="0.45"/>
    <!-- Flame 3 -->
    <path d="M310,220 Q322,190 318,170 Q332,148 326,220Z" fill="#ff4400" opacity="0.4"/>
    <!-- Flame 4 -->
    <path d="M450,220 Q462,185 457,162 Q472,140 466,220Z" fill="#ff6600" opacity="0.5"/>
    <!-- Flame 5 -->
    <path d="M590,220 Q602,188 597,165 Q612,143 606,220Z" fill="#ff4400" opacity="0.45"/>
    <!-- Flame 6 -->
    <path d="M720,220 Q732,182 728,162 Q744,140 737,220Z" fill="#ff5500" opacity="0.4"/>
    <!-- Flame 7 -->
    <path d="M840,220 Q852,190 848,172 Q860,155 855,220Z" fill="#ff4400" opacity="0.5"/>
  </g>

  <!-- Horizontal heat lines (subtle atmosphere) -->
  <g opacity="0.07" stroke="#ff6600" stroke-width="0.5" fill="none">
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="195" x2="900" y2="195"/>
    <line x1="0" y1="165" x2="900" y2="165"/>
  </g>

  <!-- Shadow behind name for depth -->
  <text
    x="450" y="128"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="96"
    font-weight="900"
    letter-spacing="14"
    fill="#ff3300"
    opacity="0.35"
    filter="url(#textglow)"
  >P HARISH</text>

  <!-- Main name text -->
  <text
    x="450" y="128"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="96"
    font-weight="900"
    letter-spacing="14"
    fill="url(#namegrad)"
  >P HARISH</text>

  <!-- Subtitle -->
  <text
    x="450" y="168"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="13"
    font-weight="400"
    letter-spacing="5"
    fill="#ff9966"
    opacity="0.9"
  >FULL STACK DEVELOPER  ·  CRICKET + CODE = LIFE</text>

  <!-- Subtle top edge vignette -->
  <rect width="900" height="30" fill="url(#bg)" opacity="0.6"/>
</svg>
